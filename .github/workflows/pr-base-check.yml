name: PR base check

# Workflow politikası gardiyanı:
#   - feature/* veya fix/* → PR base=dev olmalı
#   - dev → main yalnız release PR için izinli
#   - Diğer base'ler (örn. branch'ler arası) serbest
#
# Branch protection ruleset'inde bu check'i "Require status checks to pass"
# olarak işaretle (job adı: "base-check") → yanlış base ile açılan PR'lar
# merge edilemez.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  base-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate base/head pair
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          # Codex P2 — fork bypass guard: dev/main yalnız aynı repo branch'i olmalı.
          # Fork'tan açılan PR'da head.repo.full_name farklı; "fork:dev" adıyla
          # base=main bypass etme riskini engelle.
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          THIS_REPO: ${{ github.repository }}
        run: |
          echo "PR head=$HEAD  base=$BASE  head_repo=$HEAD_REPO  this_repo=$THIS_REPO"

          SAME_REPO=0
          if [ "$HEAD_REPO" = "$THIS_REPO" ]; then SAME_REPO=1; fi

          # 1) base=dev → daima izinli (normal feature/fix akışı; fork dahil)
          if [ "$BASE" = "dev" ]; then
            echo "OK: base is dev (normal feature/fix flow)"
            exit 0
          fi

          # 2) base=main + head=dev + AYNI REPO → release PR, izinli
          if [ "$BASE" = "main" ] && [ "$HEAD" = "dev" ] && [ "$SAME_REPO" = "1" ]; then
            echo "OK: release PR (canonical dev -> main)"
            exit 0
          fi

          # 3) base=main + head=dev + FORK → reddedilir (Codex P2 fork bypass)
          if [ "$BASE" = "main" ] && [ "$HEAD" = "dev" ]; then
            echo "::error::Release PR (dev -> main) must come from the canonical repository, not a fork ($HEAD_REPO)."
            exit 1
          fi

          # 4) base=main + head=hotfix/* + AYNI REPO → onaylı hotfix yolu (Codex P2)
          # AI_WORKFLOW.md ve pull_request_template.md "main only for release /
          # approved hotfix" diyor. Branch ismi hotfix/* niyeti açık etiketler;
          # "onaylı" kısmı manuel PR review aşamasında — check'in işi değil.
          case "$HEAD" in
            hotfix/*)
              if [ "$SAME_REPO" = "1" ] && [ "$BASE" = "main" ]; then
                echo "OK: approved hotfix PR (canonical hotfix/* -> main)"
                exit 0
              fi
              ;;
          esac

          # 5) base=main + head != dev/hotfix → POLİTİKA İHLALİ
          if [ "$BASE" = "main" ]; then
            echo "::error::PR base 'main' is reserved for release (head=dev) or approved hotfix (head=hotfix/*) PRs. For feature/fix branches, change base to 'dev' from the PR edit menu."
            exit 1
          fi

          # 6) Başka base'ler (örn. branch'ler arası) — politika dışı, serbest
          echo "OK: non-policy base ($BASE)"
          exit 0
