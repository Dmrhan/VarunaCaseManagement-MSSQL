name: Pattern Detect Cron

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  detect:
    if: github.repository == 'Dmrhan/VarunaCaseManagement'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pattern detection
        run: |
          curl --fail-with-body -X POST \
            -H "x-uptime-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://varuna-case-management.vercel.app/api/cron/pattern-detect
