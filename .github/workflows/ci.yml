name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Minimum permissions for GITHUB_TOKEN. actions/checkout@v4 requires
# contents:read; pull-requests:read covers PR event metadata. Even when
# the repo "default workflow permissions" setting is restrictive, this
# explicit block lets checkout succeed (resolves "git failed with exit
# code 128 / The requested URL returned error: 403").
permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Type Check + Build + Schema Validate
    runs-on: ubuntu-latest

    env:
      # Prisma validate ve client generate placeholder DATABASE_URL ile çalışır.
      # Gerçek DB'ye bağlanmaz — sadece schema parse + type üretimi için.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        # postinstall hook otomatik prisma generate çağırır → @prisma/client
        # tipleri tsc'den önce hazır olur.

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: TypeScript type check
        run: npx tsc -b

      - name: Vite build
        # Build script'i (`prisma migrate deploy && tsc -b && vite build`) CI'da
        # DB'ye bağlanmaya çalışıyor. Burada sadece vite build'i çalıştırıyoruz —
        # migration'lar Vercel deploy'ında uygulanır, type check + schema doğrulamasını
        # önceki adımlarda yaptık.
        run: npx vite build

      - name: Help registry script syntax check
        # Static parse — fail fast on syntax errors before invoking the smoke.
        run: node --check scripts/smoke-help-content.js

      - name: Help registry freshness smoke
        # Reads src/help/helpRegistry.ts (TypeScript), validates required keywords,
        # banned phrases, and `updatedAt` for every HelpTopic. No DB/env needed —
        # see docs/IN_PRODUCT_HELP_STANDARD.md §"Smoke check".
        run: npm run smoke:help-content
