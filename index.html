<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- WR-G5 — Brand metadata + favicon. Tek asset (public/varuna-logo.png) yeniden kullanılıyor. -->
    <link rel="icon" type="image/png" sizes="any" href="/varuna-logo.png" />
    <link rel="apple-touch-icon" href="/varuna-logo.png" />
    <meta name="description" content="Varuna — çok kiracılı vaka yönetimi, müşteri operasyonu ve destek iş akışı platformu." />
    <meta name="theme-color" content="#3b62f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Varuna Case Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Dark mode'u CSS yüklenmeden önce ayarla (FOUC önleme).
      try {
        var saved = localStorage.getItem('varuna-theme');
        var dark = saved === 'dark' || (saved == null && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) { /* yoksay */ }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
