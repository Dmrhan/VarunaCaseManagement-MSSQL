<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Varuna Case Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Dark mode'u CSS yüklenmeden önce ayarla (FOUC önleme).
      try {
        var saved = localStorage.getItem('varuna-theme');
        var dark = saved === 'dark' || (saved == null && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) { /* yoksay */ }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
